<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض النتيجة</title>
</head>
<body>

<h2>نتيجة الطلاب</h2>

<input type="text" id="seat" placeholder="اكتب رقم الجلوس">

<button onclick="searchResult()">عرض النتيجة</button>

<p id="result"></p>

<script>
const students = {
"1001":"أحمد محمد - المجموع 480 - ممتاز",
"1002":"علي حسن - المجموع 450 - جيد جدًا"
};

function searchResult(){
let seat=document.getElementById("seat").value;
let result=document.getElementById("result");

if(students[seat]){
result.innerHTML=students[seat];
}else{
result.innerHTML="رقم الجلوس غير موجود";
}
}
</script>

</body>
</html>
